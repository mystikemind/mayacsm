# Project Maya - Kubernetes Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: maya-ingress
  namespace: maya
  labels:
    app: maya
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # WebSocket support
    nginx.ingress.kubernetes.io/websocket-services: "maya-api"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$request_uri"
    # SSL
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - maya.example.com
      secretName: maya-tls-secret
  rules:
    - host: maya.example.com
      http:
        paths:
          # HTTP API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: maya-api
                port:
                  name: http
          # Health endpoints
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: maya-api
                port:
                  name: http
          # WebSocket endpoint
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: maya-api
                port:
                  name: websocket

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: maya-service-account
  namespace: maya
  labels:
    app: maya

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: maya-pdb
  namespace: maya
  labels:
    app: maya
spec:
  maxUnavailable: 0  # Never disrupt GPU workloads
  selector:
    matchLabels:
      app: maya
      component: voice-ai
