# Project Maya - Kubernetes Services
---
# Main API Service
apiVersion: v1
kind: Service
metadata:
  name: maya-api
  namespace: maya
  labels:
    app: maya
    component: voice-ai
spec:
  type: ClusterIP
  selector:
    app: maya
    component: voice-ai
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: websocket
      port: 8765
      targetPort: websocket
      protocol: TCP

---
# Metrics Service for Prometheus
apiVersion: v1
kind: Service
metadata:
  name: maya-metrics
  namespace: maya
  labels:
    app: maya
    component: voice-ai
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
spec:
  type: ClusterIP
  selector:
    app: maya
    component: voice-ai
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP

---
# Headless Service for WebSocket sticky sessions
apiVersion: v1
kind: Service
metadata:
  name: maya-websocket
  namespace: maya
  labels:
    app: maya
    component: voice-ai
spec:
  type: ClusterIP
  clusterIP: None  # Headless for direct pod access
  selector:
    app: maya
    component: voice-ai
  ports:
    - name: websocket
      port: 8765
      targetPort: websocket
      protocol: TCP
